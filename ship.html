<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giá Ship Việt Nam</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; }
  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; color: #111; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 24px; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
  .btn-primary { background: #1a56db; color: white; }
  .btn-primary:hover { background: #1347c8; }
  .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
  .btn-outline { background: white; color: #374151; border: 1px solid #d1d5db; }
  .btn-outline:hover { background: #f9fafb; }
  .controls { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .badge-blue { background: #dbeafe; color: #1e40af; }
  .badge-green { background: #dcfce7; color: #15803d; }
  .badge-yellow { background: #fef9c3; color: #854d0e; }
  .badge-gray { background: #f3f4f6; color: #374151; }
  .carrier-card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; margin-bottom: 16px; overflow: hidden; }
  .carrier-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid #f3f4f6; }
  .carrier-logo { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: white; flex-shrink: 0; }
  .carrier-name { font-size: 16px; font-weight: 600; color: #111; }
  .carrier-meta { font-size: 12px; color: #6b7280; margin-top: 2px; }
  .carrier-body { padding: 16px 20px; }
  .price-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .price-table th { text-align: left; padding: 6px 10px; background: #f9fafb; color: #6b7280; font-weight: 500; border-bottom: 1px solid #e5e7eb; }
  .price-table td { padding: 8px 10px; border-bottom: 1px solid #f3f4f6; color: #374151; }
  .price-table tr:last-child td { border-bottom: none; }
  .price-highlight { font-weight: 600; color: #111; }
  .note-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #78350f; margin-top: 12px; line-height: 1.6; }
  .loading-card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 24px; margin-bottom: 16px; }
  .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-bar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: #eff6ff; border-radius: 8px; font-size: 13px; color: #1d4ed8; margin-bottom: 16px; }
  .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px 16px; color: #b91c1c; font-size: 13px; margin-bottom: 12px; }
  .tag { display: inline-block; background: #f3f4f6; color: #374151; border-radius: 4px; padding: 2px 6px; font-size: 11px; margin-right: 4px; }
  .updated-at { font-size: 11px; color: #9ca3af; margin-top: 16px; text-align: right; }
  .section-divider { display: flex; align-items: center; gap: 10px; margin: 20px 0 10px; }
  .section-divider span { font-size: 13px; font-weight: 600; color: #374151; white-space: nowrap; }
  .section-divider hr { flex: 1; border: none; border-top: 1px solid #e5e7eb; }
  .disclaimer { font-size: 12px; color: #9ca3af; line-height: 1.6; margin-top: 20px; padding-top: 16px; border-top: 1px solid #e5e7eb; }
</style>
</head>
<body>
<div class="container">
  <h1>📦 Bảng Giá Ship Việt Nam</h1>
  <p class="subtitle">Thu thập tự động từ dữ liệu mới nhất · Cập nhật theo yêu cầu</p>

  <div class="controls">
    <button class="btn btn-primary" id="fetchBtn" onclick="fetchAllCarriers()">
      <span>🔍</span> Thu thập giá ship mới nhất
    </button>
    <button class="btn btn-outline" id="clearBtn" onclick="clearResults()" style="display:none">
      Xóa kết quả
    </button>
  </div>

  <div id="statusBar" style="display:none" class="status-bar">
    <div class="spinner" style="border-color: rgba(29,78,216,0.3); border-top-color: #1d4ed8;"></div>
    <span id="statusText">Đang thu thập dữ liệu...</span>
  </div>

  <div id="results"></div>
  <div id="disclaimer" style="display:none" class="disclaimer">
    ⚠️ Giá ship được tổng hợp từ thông tin công khai và có thể thay đổi. Vui lòng truy cập trực tiếp website của từng đơn vị để có báo giá chính xác nhất. Thông tin chỉ mang tính tham khảo.
  </div>
</div>

<script>
const CARRIERS = [
  { id: 'ghtk', name: 'Giao Hàng Tiết Kiệm', short: 'GHTK', color: '#e8612c', emoji: 'G', tags: ['Phổ biến', 'COD'] },
  { id: 'ghn', name: 'Giao Hàng Nhanh', short: 'GHN', color: '#f77f00', emoji: 'G', tags: ['Phổ biến', 'Nhanh'] },
  { id: 'viettelpost', name: 'Viettel Post', short: 'VTP', color: '#e5001c', emoji: 'V', tags: ['Toàn quốc', 'COD'] },
  { id: 'vnpost', name: 'Vietnam Post', short: 'VNP', color: '#006cb7', emoji: 'V', tags: ['Hỏa tốc', 'Toàn quốc'] },
  { id: 'jt', name: 'J&T Express', short: 'J&T', color: '#e30613', emoji: 'J', tags: ['Nhanh', 'Đa dạng'] },
  { id: 'grab', name: 'GrabExpress', short: 'Grab', color: '#00b14f', emoji: 'G', tags: ['Nội thành', 'Hỏa tốc'] },
  { id: 'best', name: 'BEST Express', short: 'BEST', color: '#f7941d', emoji: 'B', tags: ['Giá tốt', 'COD'] },
  { id: 'ninjavan', name: 'Ninja Van', short: 'NV', color: '#0e0e0e', emoji: 'N', tags: ['Chuyên nghiệp', 'B2B'] },
];

async function fetchCarrierData(carrier) {
  const prompt = `Bạn là chuyên gia logistics Việt Nam. Hãy cung cấp thông tin bảng giá cước vận chuyển MỚI NHẤT (năm 2024-2025) của đơn vị: ${carrier.name} (${carrier.short}).

Trả lời CHÍNH XÁC theo định dạng JSON sau, không thêm text nào khác:
{
  "summary": "Mô tả ngắn 1 câu về dịch vụ",
  "note": "Lưu ý quan trọng về giá hoặc điều kiện (1-2 câu)",
  "domestic": [
    {"route": "Nội thành (HCM/HN)", "weight": "0-500g", "price": "XX.000đ"},
    {"route": "Nội thành (HCM/HN)", "weight": "500g-1kg", "price": "XX.000đ"},
    {"route": "Ngoại thành / Vùng lân cận", "weight": "0-500g", "price": "XX.000đ"},
    {"route": "Liên tỉnh (cùng miền)", "weight": "0-500g", "price": "XX.000đ"},
    {"route": "Liên tỉnh (khác miền)", "weight": "0-500g", "price": "XX.000đ"},
    {"route": "Phụ phí thêm/kg vượt", "weight": "1kg tiếp theo", "price": "+XX.000đ"}
  ],
  "services": [
    {"name": "Tên dịch vụ đặc biệt", "description": "Mô tả ngắn và giá tham khảo"}
  ],
  "website": "URL chính thức",
  "hotline": "Số hotline"
}

Chỉ trả về JSON, không markdown, không giải thích.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  const data = await res.json();
  const text = data.content?.[0]?.text || '{}';
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

function renderLoading(carrier) {
  return `
  <div class="loading-card" id="loading-${carrier.id}">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="carrier-logo" style="background:${carrier.color}">${carrier.emoji}</div>
      <div style="flex:1">
        <div class="skeleton" style="height:16px;width:180px;margin-bottom:6px"></div>
        <div class="skeleton" style="height:12px;width:120px"></div>
      </div>
    </div>
    <div class="skeleton" style="height:12px;width:100%;margin-bottom:8px"></div>
    <div class="skeleton" style="height:12px;width:80%"></div>
  </div>`;
}

function renderCarrierCard(carrier, info) {
  const tagsHtml = carrier.tags.map(t => `<span class="tag">${t}</span>`).join('');
  const rowsHtml = (info.domestic || []).map(r => `
    <tr>
      <td>${r.route}</td>
      <td>${r.weight}</td>
      <td class="price-highlight">${r.price}</td>
    </tr>`).join('');

  const servicesHtml = (info.services || []).map(s => `
    <div style="margin-top:8px;font-size:13px">
      <span style="font-weight:600;color:#111">${s.name}:</span>
      <span style="color:#6b7280"> ${s.description}</span>
    </div>`).join('');

  const contactHtml = [
    info.website ? `<a href="${info.website}" target="_blank" style="color:#1a56db;font-size:12px;text-decoration:none">🌐 Website</a>` : '',
    info.hotline ? `<span style="font-size:12px;color:#6b7280">📞 ${info.hotline}</span>` : ''
  ].filter(Boolean).join(' · ');

  return `
  <div class="carrier-card">
    <div class="carrier-header">
      <div class="carrier-logo" style="background:${carrier.color}">${carrier.emoji}</div>
      <div style="flex:1">
        <div class="carrier-name">${carrier.name}</div>
        <div class="carrier-meta">${tagsHtml}</div>
      </div>
      <div style="text-align:right">${contactHtml}</div>
    </div>
    <div class="carrier-body">
      ${info.summary ? `<p style="font-size:13px;color:#374141;margin-bottom:12px">${info.summary}</p>` : ''}
      <table class="price-table">
        <thead>
          <tr>
            <th style="width:40%">Tuyến đường</th>
            <th style="width:25%">Trọng lượng</th>
            <th style="width:35%">Giá cước</th>
          </tr>
        </thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      ${servicesHtml ? `<div class="section-divider"><hr><span>Dịch vụ đặc biệt</span><hr></div>${servicesHtml}` : ''}
      ${info.note ? `<div class="note-box">💡 ${info.note}</div>` : ''}
    </div>
  </div>`;
}

let isFetching = false;

async function fetchAllCarriers() {
  if (isFetching) return;
  isFetching = true;

  const btn = document.getElementById('fetchBtn');
  const statusBar = document.getElementById('statusBar');
  const statusText = document.getElementById('statusText');
  const resultsDiv = document.getElementById('results');
  const disclaimer = document.getElementById('disclaimer');

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Đang thu thập...';
  statusBar.style.display = 'flex';
  disclaimer.style.display = 'none';

  // Show loading skeletons
  resultsDiv.innerHTML = CARRIERS.map(c => renderLoading(c)).join('');

  const now = new Date();
  const errors = [];

  for (let i = 0; i < CARRIERS.length; i++) {
    const carrier = CARRIERS[i];
    statusText.textContent = `Đang lấy dữ liệu ${carrier.name} (${i+1}/${CARRIERS.length})...`;

    try {
      const info = await fetchCarrierData(carrier);
      const loadingEl = document.getElementById(`loading-${carrier.id}`);
      if (loadingEl) {
        loadingEl.outerHTML = renderCarrierCard(carrier, info);
      }
    } catch (err) {
      errors.push(carrier.name);
      const loadingEl = document.getElementById(`loading-${carrier.id}`);
      if (loadingEl) {
        loadingEl.innerHTML = `<div style="display:flex;align-items:center;gap:12px;padding:4px 0;margin-bottom:8px">
          <div class="carrier-logo" style="background:${carrier.color}">${carrier.emoji}</div>
          <span style="font-weight:600">${carrier.name}</span>
        </div>
        <div class="error-box">Không thể lấy dữ liệu. Vui lòng thử lại.</div>`;
      }
    }
  }

  const timeStr = now.toLocaleString('vi-VN');
  const extraHtml = `<p class="updated-at">Dữ liệu thu thập lúc: ${timeStr}</p>`;
  resultsDiv.insertAdjacentHTML('beforeend', extraHtml);

  statusBar.style.display = 'none';
  btn.disabled = false;
  btn.innerHTML = '<span>🔄</span> Cập nhật lại';
  document.getElementById('clearBtn').style.display = 'inline-flex';
  disclaimer.style.display = 'block';
  isFetching = false;
}

function clearResults() {
  document.getElementById('results').innerHTML = '';
  document.getElementById('disclaimer').style.display = 'none';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('fetchBtn').innerHTML = '<span>🔍</span> Thu thập giá ship mới nhất';
}
</script>
</body>
</html>
